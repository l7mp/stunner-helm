apiVersion: v2
name: stunner-crds
description: STUNner Custom Resource Definitions (CRDs)
maintainers:
  - name: l7mp
    email: info@l7mp.io
    url: https://l7mp.io
icon: https://raw.githubusercontent.com/l7mp/stunner/main/docs/img/stunner.svg
type: application
version: 1.1.1
appVersion: 1.1.1
keywords:
  - stunner
  - gateway
  - webrtc
  - turn
  - crd
sources:
  - https://github.com/l7mp/stunner-helm
home: https://github.com/l7mp/stunner-helm
dependencies:
  - name: gateway-api-standard-crds
    alias: standardCrds
    version: "1.4.1"
    repository: "file://./charts/gateway-api-standard-crds"
    condition: standardCrds.enabled
  - name: gateway-api-experimental-crds
    alias: experimentalCrds
    version: "1.4.1"
    repository: "file://./charts/gateway-api-experimental-crds"
    condition: experimentalCrds.enabled
