{{- if eq .Values.stunnerGatewayOperator.dataplane.mode "managed"}}
{{- $dataplaneLogFormat := (default "text" .Values.logging.dataplane.format | lower) }}
{{- if and (ne $dataplaneLogFormat "text") (ne $dataplaneLogFormat "json") }}
{{- fail (printf "invalid logging.dataplane.format %q: must be text or json" .Values.logging.dataplane.format) }}
{{- end }}
{{- with .Values.stunnerGatewayOperator.dataplane.spec }}
apiVersion: stunner.l7mp.io/v1
kind: Dataplane
metadata:
  name: default
spec:
  replicas: {{ .replicas }}
  image: "{{ .image.name }}:{{ .image.tag }}"
  imagePullPolicy: {{ .image.pullPolicy }}
  {{- if .imagePullSecrets }}
  imagePullSecrets: {{- toYaml .imagePullSecrets | nindent 4 }}
  {{- end }}
  command:
    {{- range .command }}
    - {{ . }}
    {{- end }}
  args:
    {{- range .args }}
    - {{ . }}
    {{- end }}
    - --log-format={{ $dataplaneLogFormat }}
  {{- with .env }}
  env: {{- toYaml . | nindent 2 }}
  {{- end }}
  resources: {{- toYaml .resources | nindent 4 }}
  terminationGracePeriodSeconds: {{ .terminationGracePeriodSeconds }}
  enableMetricsEndpoint: {{ .enableMetricsEndpoint }}
  hostNetwork: {{ .hostNetwork }}
  {{- with .labels }}
  labels: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .affinity }}
  affinity: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .containerSecurityContext }}
  containerSecurityContext: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .securityContext }}
  securityContext: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .tolerations }}
  tolerations: {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- if .topologySpreadConstraints }}
  topologySpreadConstraints: {{- toYaml .topologySpreadConstraints | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}
