name: Build and Release Helm charts
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
      type:
        description: 'Name of the software that should be released.'
        required: true
        type: choice
        options:
          - stunner
          - stunner-premium

env:
  TAG: ${{ inputs.tag }}
  TYPE: ${{ inputs.type }}

jobs:
  push_chart:
    runs-on: ubuntu-latest
    steps:
      - name: Log the received tag
        run: |
          echo "Version is $TAG"
          echo "Triggered by $TYPE"

      - name: stunner-helm checkout
        uses: actions/checkout@v6
        with:
          path: stunner-helm
          ref: main
          repository: l7mp/stunner-helm

      - name: Edit helm chart for stunner
        if: ${{ env.TYPE == 'stunner' }}
        run: |
          cd stunner-helm/helm
          if ${{ env.TAG == 'dev' }}; then
            yq -i '.name = "stunner-dev"' stunner/Chart.yaml
            yq -i '
              .stunnerGatewayOperator.deployment.container.manager.image.pullPolicy = "Always" |
              .stunnerGatewayOperator.dataplane.spec.image.pullPolicy = "Always" |
              .stunnerAuthService.deployment.container.authService.image.pullPolicy = "Always"
            ' stunner/values.yaml
          else
            yq -i '.version = strenv(TAG)' stunner/Chart.yaml
          fi
          yq -i '
            .stunnerGatewayOperator.deployment.container.manager.image.tag = strenv(TAG) |
            .stunnerGatewayOperator.dataplane.spec.image.tag = strenv(TAG) |
            .stunnerAuthService.deployment.container.authService.image.tag = strenv(TAG)
          ' stunner/values.yaml
          yq -i '.appVersion = strenv(TAG)' stunner/Chart.yaml

      # STUNner premium edition
      - name: Edit helm chart for stunner-premium
        if: ${{ env.TYPE == 'stunner-premium' }}
        run: |
          cd stunner-helm/helm
          if ${{ env.TAG == 'dev' }}; then
            yq -i '
              .stunnerGatewayOperator.deployment.container.manager.image.pullPolicy = "Always" |
              .stunnerGatewayOperator.dataplane.spec.image.pullPolicy = "Always" |
              .stunnerAuthService.deployment.container.authService.image.pullPolicy = "Always"
            ' stunner/values.yaml
          else
            yq -i '.version = strenv(TAG)' stunner/Chart.yaml
          fi
          yq -i '
            .stunnerGatewayOperator.deployment.container.manager.image.tag = strenv(TAG) |
            .stunnerGatewayOperator.dataplane.spec.image.tag = strenv(TAG) |
            .stunnerAuthService.deployment.container.authService.image.tag = strenv(TAG) |
            .stunnerGatewayOperator.deployment.container.manager.image.name = "docker.io/l7mp/stunner-gateway-operator-premium" |
            .stunnerGatewayOperator.dataplane.spec.image.name = "docker.io/l7mp/stunnerd-premium"
            ' stunner/values.yaml
          yq -i '
            .name = "stunner-premium" |
            .appVersion = strenv(TAG)
          ' stunner/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: |
          cd stunner-helm
          ct lint --all --chart-dirs helm

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Run chart-testing (install)
        run: |
          cd stunner-helm
          if ${{ env.TYPE == 'stunner' && env.TAG == 'dev' }}; then
            ct install --chart-dirs helm --charts helm/stunner
          else
            ct install --chart-dirs helm --charts helm/stunner
          fi

      - name: Build helm chart for ${{ env.TYPE }}
        run: |
          cd stunner-helm/helm
          if ${{ env.TYPE == 'stunner' && env.TAG == 'dev' }}; then
            helm package stunner
          else
            helm package stunner
          fi

      - name: Set git config
        run: |
          git config --global user.email "l7mp.info@gmail.com"
          git config --global user.name "BotL7mp"

      - name: Checkout build branch
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.WEB_PAT_TOKEN }}
          path: build
          repository: l7mp/stunner-helm
          ref: build

      - name: Update build branch
        run: |
          if ${{ env.TAG == 'dev' }}; then
            if ${{ env.TYPE == 'stunner' }}; then
              # Remove previous moving dev artifacts before re-indexing the repo.
              rm -rf build/stunner-dev*.tgz
            else
              rm -rf build/${{ env.TYPE }}-dev*.tgz
            fi
          fi
          cp stunner-helm/helm/*.tgz build/
          helm repo index build --url https://l7mp.io/stunner
          cd build
          git add .
          if ${{ env.TAG == 'dev' }}; then
            git commit -m "Update dev helm chart from l7mp/${{ env.TYPE }}" -m "(triggered by the 'Helm release' github action.)"
          else
            git commit -m "Release helm chart from l7mp/${{ env.TYPE }}" -m "(triggered by the 'Helm release' github action.)"
          fi
          git push origin build

      - name: Update stunner-helm repo
        if: ${{ env.TAG != 'dev' && env.TYPE != 'stunner-premium' }}
        run: |
          cd stunner-helm
          rm helm/*.tgz
          git add .
          git commit -m "Update helm charts from l7mp/${{ env.TYPE }}" -m "(triggered by the 'Helm release' github action.)"
          git push origin main
